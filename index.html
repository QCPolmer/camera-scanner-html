<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Paper Scanner</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 10px; 
            background: #1a1a1a; 
            color: #eee; 
        }
        video, canvas { 
            background: #111; 
            border: 2px solid #555; 
            margin: 8px 0; 
            display: block; 
            max-width: 100%; 
            touch-action: none;   /* critical for mobile dragging */
        }
        button { 
            padding: 14px 20px; 
            margin: 6px; 
            font-size: 17px; 
            background: #333; 
            color: #fff; 
            border: 1px solid #666; 
            border-radius: 6px;
        }
        .note { 
            background: #333; 
            color: #ffdd00; 
            padding: 12px; 
            border-radius: 6px; 
            margin-bottom: 15px; 
        }
        .main-area {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .output-controls {
            background: #222; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 15px 0;
            color: #ddd;
        }
        label { display: inline-block; width: 160px; }
        input[type="range"] { width: 320px; }
    </style>
</head>
<body>

<div class="note">
    <strong>Note:</strong> On mobile use landscape mode.<br>
    Tap "Toggle Camera" twice if the camera list doesn't populate.
</div>

<div class="controls">
    <button onclick="toggleCamera()">📹 Toggle Camera</button>
    <button onclick="takePicture()">📸 Take Picture</button>
    <button onclick="importImage()">📁 Import Image</button>
    <button onclick="renderFull()">🔄 Render Full Output</button>
    <button onclick="resetPoints()">🔄 Reset All</button>
    <button onclick="exportWarped()">💾 Export</button>
</div>

<select id="camera_list_div" onchange="switchCamera(this.value)"></select>
<select id="resolution_select_div" onchange="if(isCameraOn) startStream(currentDeviceId)">
    <option value="640x480">640x480</option>
    <option value="1280x720" selected>1280x720</option>
    <option value="1920x1080">1920x1080</option>
    <option value="3840x2160">3840x2160 (4K)</option>
</select>

<video id="video_takepicture_div" autoplay playsinline></video>

<h3>Source — Drag the 4 red points</h3>

<div class="main-area">
    <div>
        <canvas id="source_canvas" width="800" height="600"></canvas>
    </div>
    <div>
        <h4>Live Preview</h4>
        <canvas id="live_preview" width="380" height="280"></canvas>
    </div>
</div>

<div class="output-controls">
    <strong>Output Controls</strong><br><br>
    
    <div>
        <label>Rotate Points:</label>
        <input type="range" id="point_rotate_slider" min="0" max="360" value="0" step="0.1" 
               oninput="rotatePoints(this.value)">
        <span id="point_rotate_value">0°</span>
    </div>

    <div>
        <label>Output Scale: <span id="output_scale_value">1.0</span>x</label>
        <input type="range" id="output_scale_slider" min="0.3" max="1.5" value="1.0" step="0.01" 
               oninput="updateOutputScale(this.value)">
    </div>

    <div style="margin-top:10px">
        <label>Brightness: <span id="bright_value">0</span></label>
        <input type="range" id="brightness_slider" min="-50" max="50" value="0" step="1" 
               oninput="updateBrightness(this.value)">
    </div>

    <div>
        <label>Contrast: <span id="contrast_value">0</span></label>
        <input type="range" id="contrast_slider" min="-50" max="50" value="0" step="1" 
               oninput="updateContrast(this.value)">
    </div>

    <div style="margin-top:15px">
        <label><input type="checkbox" id="lock_aspect" onchange="renderFull()"> Lock Aspect Ratio</label>
    </div>

    <div>
        <label>Common Size:</label>
        <select id="aspect_select" onchange="updateAspectFromDropdown()">
            <option value="0">Free</option>
            <option value="1.333" selected>4:3</option>
            <option value="1.5">3:2</option>
            <option value="1">1:1</option>
            <option value="1.667">3x5 Card</option>
            <option value="0.707">A4 Portrait</option>
            <option value="0.772">US Letter Portrait</option>
        </select>
    </div>

    <div style="margin-top:12px">
        <label>Fine Aspect: <span id="fine_aspect_value">1.33</span></label>
        <input type="range" id="fine_aspect_slider" min="0.5" max="3.0" value="1.33" step="0.01" 
               oninput="updateFineAspect(this.value)">
        <input type="number" id="fine_aspect_input" value="1.33" step="0.01" 
               style="width:80px; background:#333; color:#fff; border:1px solid #666;" 
               onchange="updateFineAspect(this.value)">
    </div>
</div>

<h3>Final Warped Result</h3>
<canvas id="result_canvas"></canvas>

<script>
// Built with help from Grok (xAI) & Gemini — feel free to use and modify freely.

let currentStream = null;
let isCameraOn = false;
let capturedImage = null;
let currentDeviceId = null;

let sourceCtx, resultCtx, previewCtx;
let points = [];
let draggingIndex = -1;
let pointRotation = 0;
let fineAspectRatio = 1.333;
let outputScale = 1.0;
let brightness = 0;
let contrast = 0;

const myGlobalThis = window;
Array.from(document.querySelectorAll('*')).forEach(el => {
    if (el.id) myGlobalThis[el.id] = el;
});

function initCanvases() {
    sourceCtx = source_canvas.getContext('2d');
    resultCtx = result_canvas.getContext('2d', { willReadFrequently: true });
    previewCtx = live_preview.getContext('2d', { willReadFrequently: true });

    // FIX 1: Use ONLY Pointer events for maximum cross-device compatibility.
    // Removed the conflicting touchstart/move/end listeners.
    source_canvas.addEventListener('pointerdown', onPointerDown);
    source_canvas.addEventListener('pointermove', onPointerMove);
    source_canvas.addEventListener('pointerup', onPointerUp);
    source_canvas.addEventListener('pointerleave', onPointerUp);
    source_canvas.addEventListener('pointercancel', onPointerUp); // Catches system interruptions

    resetPoints(true);
}

async function toggleCamera() {
    if (isCameraOn) {
        stopStream();
    } else {
        // First-time "Prime": Ask for any camera to get permissions
        await startStream();
        // Now that we have permission, names will be visible
        await populateCameraList();
    }
}

function stopStream() {
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
    }
    video_takepicture_div.srcObject = null;
    isCameraOn = false;
}

async function populateCameraList() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    
    camera_list_div.innerHTML = '';
    videoDevices.forEach((device, index) => {
        const option = document.createElement('option');
        option.value = device.deviceId;
        option.text = device.label || `Camera ${index + 1}`;
        camera_list_div.appendChild(option);
    });
}

async function switchCamera(deviceId) {
    currentDeviceId = deviceId;
    if (isCameraOn) await startStream(deviceId);
}

async function startStream(deviceId = null) {
    stopStream();

    // Get resolution from the dropdown
    const resString = resolution_select_div.value; // e.g., "3840x2160"
    const [w, h] = resString.split('x').map(Number);

    const constraints = {
        video: {
            width: { ideal: w },
            height: { ideal: h },
            deviceId: deviceId ? { exact: deviceId } : undefined
        }
    };

    // If no deviceId, try to default to the back camera (environment)
    if (!deviceId) {
        constraints.video.facingMode = "environment";
    }

    try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video_takepicture_div.srcObject = currentStream;
        isCameraOn = true;
        
        // Log what we actually got (check your console for this!)
        const settings = currentStream.getVideoTracks()[0].getSettings();
        console.log(`Actual resolution: ${settings.width}x${settings.height}`);
        
    } catch (err) {
        console.error("Camera error:", err);
        alert("Could not start camera at this resolution. Try 1280x720.");
    }
}
function resetPoints(initial = false) {
    const w = source_canvas.width;
    const h = source_canvas.height;
    points = [
        {x: w*0.15, y: h*0.15},
        {x: w*0.85, y: h*0.15},
        {x: w*0.85, y: h*0.88},
        {x: w*0.15, y: h*0.88}
    ];
    pointRotation = 0;
    fineAspectRatio = 1.333;
    outputScale = 1.0;
    brightness = 0;
    contrast = 0;

    const els = ['point_rotate_slider','point_rotate_value','output_scale_slider','output_scale_value',
                 'brightness_slider','bright_value','contrast_slider','contrast_value',
                 'fine_aspect_slider','fine_aspect_input','aspect_select'];
    els.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            if (id.includes('slider') || id.includes('input')) el.value = id.includes('aspect') ? 1.333 : 0;
            if (id.includes('value')) el.textContent = id.includes('rotate') ? '0°' : '0';
        }
    });

    if (!initial && capturedImage) {
        redrawSource();
        renderPreview(); // FIX 2: Default to lightweight preview
    }
}

function onPointerDown(e) {
    source_canvas.setPointerCapture(e.pointerId); 
    const rect = source_canvas.getBoundingClientRect();
    
    // THE FIX: Calculate the scale difference between CSS size and internal canvas size
    const scaleX = source_canvas.width / rect.width;
    const scaleY = source_canvas.height / rect.height;

    // Apply the scale to our pointer coordinates
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;

    for (let i = 0; i < 4; i++) {
        const dx = mx - points[i].x;
        const dy = my - points[i].y;
        
        // I also bumped the hit radius from 1600 (40px) to 2500 (50px) 
        // to make it a little more forgiving for "fat-fingering" on mobile.
        if (dx*dx + dy*dy < 2500) { 
            draggingIndex = i;
            return;
        }
    }
}

let isRendering = false;
let cachedSrcData = null;
let cachedSrcWidth = 0;
let cachedSrcHeight = 0;

// Call this once after taking a picture or importing
function cacheImageData() {
    if (!capturedImage) return;
    const offscreen = document.createElement('canvas');
    offscreen.width = capturedImage.width;
    offscreen.height = capturedImage.height;
    const ctx = offscreen.getContext('2d');
    ctx.drawImage(capturedImage, 0, 0);
    const imgData = ctx.getImageData(0, 0, offscreen.width, offscreen.height);
    cachedSrcData = imgData.data;
    cachedSrcWidth = offscreen.width;
    cachedSrcHeight = offscreen.height;
}

function onPointerMove(e) {
    if (draggingIndex === -1) return;
    
    const rect = source_canvas.getBoundingClientRect();
    const scaleX = source_canvas.width / rect.width;
    const scaleY = source_canvas.height / rect.height;

    points[draggingIndex].x = (e.clientX - rect.left) * scaleX;
    points[draggingIndex].y = (e.clientY - rect.top) * scaleY;

    clampPoints();
    redrawSource();

    // Only request a preview render if one isn't already queued
    if (!isRendering) {
        isRendering = true;
        requestAnimationFrame(() => {
            renderPreview();
            isRendering = false;
        });
    }
}

function performWarping(targetCanvas, targetCtx, isPreview) {
    if (!cachedSrcData) return;

    const baseW = isPreview ? 300 : Math.round(cachedSrcWidth * outputScale); 
    const baseH = Math.round(baseW / fineAspectRatio);
    
    if (targetCanvas.width !== baseW) targetCanvas.width = baseW;
    if (targetCanvas.height !== baseH) targetCanvas.height = baseH;

    const dstImageData = targetCtx.createImageData(baseW, baseH);
    const dstData = dstImageData.data;

    const scaleX = cachedSrcWidth / source_canvas.width;
    const scaleY = cachedSrcHeight / source_canvas.height;
    const srcPts = points.map(p => ({ x: p.x * scaleX, y: p.y * scaleY }));

    // Optimization: Pre-calculate constants outside the loop
    const p0 = srcPts[0], p1 = srcPts[1], p2 = srcPts[2], p3 = srcPts[3];
    const contrastFactor = (1 + contrast / 100);

    for (let y = 0; y < baseH; y++) {
        const v = y / baseH;
        const vInv = 1 - v;
        
        for (let x = 0; x < baseW; x++) {
            const u = x / baseW;
            const uInv = 1 - u;

            // Bilinear interpolation for the perspective warp
            const srcX = uInv * vInv * p0.x + u * vInv * p1.x + u * v * p2.x + uInv * v * p3.x;
            const srcY = uInv * vInv * p0.y + u * vInv * p1.y + u * v * p2.y + uInv * v * p3.y;

            const sx = (srcX + 0.5) | 0; // Faster Math.round
            const sy = (srcY + 0.5) | 0;

            if (sx >= 0 && sx < cachedSrcWidth && sy >= 0 && sy < cachedSrcHeight) {
                const srcIdx = (sy * cachedSrcWidth + sx) << 2; // Faster multiplication
                const dstIdx = (y * baseW + x) << 2;

                // Brightness/Contrast inline
                dstData[dstIdx]     = (cachedSrcData[srcIdx] - 128) * contrastFactor + 128 + brightness;
                dstData[dstIdx + 1] = (cachedSrcData[srcIdx + 1] - 128) * contrastFactor + 128 + brightness;
                dstData[dstIdx + 2] = (cachedSrcData[srcIdx + 2] - 128) * contrastFactor + 128 + brightness;
                dstData[dstIdx + 3] = 255;
            }
        }
    }
    targetCtx.putImageData(dstImageData, 0, 0);
}
function onPointerUp(e) {
    if (draggingIndex !== -1) {
        source_canvas.releasePointerCapture(e.pointerId);
        renderPreview(); // FIX 2: Only render preview on drop
    }
    draggingIndex = -1;
}

function clampPoints() {
    const w = source_canvas.width, h = source_canvas.height;
    for (let p of points) {
        p.x = Math.max(10, Math.min(w-10, p.x));
        p.y = Math.max(10, Math.min(h-10, p.y));
    }
}

function redrawSource() {
    if (!capturedImage) return;
    sourceCtx.drawImage(capturedImage, 0, 0, source_canvas.width, source_canvas.height);

    sourceCtx.strokeStyle = '#0f0';
    sourceCtx.lineWidth = 4;
    sourceCtx.beginPath();
    sourceCtx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < 4; i++) sourceCtx.lineTo(points[i].x, points[i].y);
    sourceCtx.closePath();
    sourceCtx.stroke();

    sourceCtx.fillStyle = '#f00';
    for (let p of points) {
        sourceCtx.beginPath();
        sourceCtx.arc(p.x, p.y, 16, 0, Math.PI*2);
        sourceCtx.fill();
        sourceCtx.strokeStyle = '#fff';
        sourceCtx.lineWidth = 3;
        sourceCtx.stroke();
    }
}

*/
// Wrapper for UI elements to call
function renderPreview() {
    performWarping(live_preview, previewCtx, true);
}

// Wrapper for Export / Manual render
function renderFull() {
    performWarping(result_canvas, resultCtx, false);
}

// Controls
function rotatePoints(degrees) {
    pointRotation = parseFloat(degrees);
    document.getElementById('point_rotate_value').textContent = pointRotation.toFixed(1) + '°';

    if (!capturedImage) return;

    const cx = (points[0].x + points[1].x + points[2].x + points[3].x) / 4;
    const cy = (points[0].y + points[1].y + points[2].y + points[3].y) / 4;
    const rad = pointRotation * Math.PI / 180;

    const original = JSON.parse(JSON.stringify(points));

    for (let i = 0; i < 4; i++) {
        const dx = original[i].x - cx;
        const dy = original[i].y - cy;
        points[i].x = cx + dx * Math.cos(rad) - dy * Math.sin(rad);
        points[i].y = cy + dx * Math.sin(rad) + dy * Math.cos(rad);
    }

    redrawSource();
    renderPreview(); // Now fast!
}

// FIX 2: All UI sliders now trigger renderPreview() instead of renderFull()
function updateOutputScale(val) {
    outputScale = parseFloat(val);
    document.getElementById('output_scale_value').textContent = outputScale.toFixed(2);
}

function updateBrightness(val) {
    brightness = parseFloat(val);
    document.getElementById('bright_value').textContent = brightness;
    renderPreview(); 
}

function updateContrast(val) {
    contrast = parseFloat(val);
    document.getElementById('contrast_value').textContent = contrast;
    renderPreview();
}

function updateAspectFromDropdown() {
    const val = parseFloat(aspect_select.value);
    if (val > 0) fineAspectRatio = val;
    renderPreview();
}

function updateFineAspect(val) {
    fineAspectRatio = parseFloat(val);
    document.getElementById('fine_aspect_slider').value = fineAspectRatio;
    document.getElementById('fine_aspect_input').value = fineAspectRatio.toFixed(3);
    document.getElementById('aspect_select').value = '0';
    renderPreview();
}

function importImage() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            capturedImage = new Image();
            capturedImage.src = ev.target.result;
            capturedImage.onload = () => {
                const aspect = capturedImage.width / capturedImage.height;
                source_canvas.width = 800;
                source_canvas.height = Math.round(800 / aspect);
                redrawSource();
                renderPreview();
                renderFull(); // Render full once on import
            };
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

function takePicture() {
    if (!video_takepicture_div.srcObject) return alert("Camera not running");

    const temp = document.createElement('canvas');
    temp.width = video_takepicture_div.videoWidth;
    temp.height = video_takepicture_div.videoHeight;
    temp.getContext('2d').drawImage(video_takepicture_div, 0, 0);

    capturedImage = new Image();
    capturedImage.src = temp.toDataURL('image/png');

    capturedImage.onload = () => {
        const aspect = capturedImage.width / capturedImage.height;
        source_canvas.width = 800;
        source_canvas.height = Math.round(800 / aspect);
        redrawSource();
        renderPreview();
        renderFull(); // Render full once on capture
    };
}

function exportWarped() {
    renderFull(); // Ensure highest quality is generated right before export
    const a = document.createElement('a');
    a.download = 'paper_scan.png';
    a.href = result_canvas.toDataURL('image/png');
    a.click();
}

window.onload = initCanvases;
</script>

</body>
</html>
