<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trebuchet Scanner</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #ccc; margin: 10px; line-height: 1.4; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 10px; }
        canvas { display: block; width: 100%; height: auto; background: #000; touch-action: none; cursor: crosshair; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        button { padding: 14px; border: none; border-radius: 4px; background: #444; color: #fff; font-weight: bold; }
        button.primary { background: #0066cc; }
        button.danger { background: #cc3300; }
        #status { font-size: 12px; color: #999; text-align: center; margin-bottom: 5px; }
        label { font-size: 11px; text-transform: uppercase; color: #666; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        video { display: none; } /* Hidden: We only grab frames */
    </style>
</head>
<body>

<div class="card">
    <div id="status">Ready. Standby for capture.</div>
    <div class="btns">
        <button onclick="snap('low')">📷 Snap Low-Res</button>
        <button class="primary" onclick="snap('high')">📸 Snap High-Res</button>
    </div>
    <div class="btns">
        <button onclick="document.getElementById('file-in').click()">📁 Import</button>
        <button class="danger" onclick="location.reload()">🔄 Reset All</button>
    </div>
    <input type="file" id="file-in" style="display:none" accept="image/*" onchange="handleFile(event)">
</div>

<div class="card">
    <label>1. Align Corners</label>
    <canvas id="src-cvs"></canvas>
</div>

<div class="card">
    <label>2. Preview & Adjust Aspect</label>
    <input type="range" id="aspect-slider" min="0.5" max="1.6" step="0.01" value="0.75" oninput="renderResult()">
    <canvas id="dst-cvs"></canvas>
    <div class="btns">
        <button class="primary" style="grid-column: span 2; margin-top:10px;" onclick="download()">💾 Save Final Image</button>
    </div>
</div>

<video id="v-temp" autoplay playsinline></video>

<script>
/**
 * THE ARCHITECTURE:
 * One-shot capture to minimize memory footprint.
 * Scaling coordinate system (800px UI vs Actual Sensor Resolution).
 * Homography-based pixel warping.
 */

let masterData = null; // Uint8ClampedArray of high-res pixels
let masterW = 0, masterH = 0;
let points = [];
let draggingIdx = -1;

const srcCvs = document.getElementById('src-cvs');
const srcCtx = srcCvs.getContext('2d');
const dstCvs = document.getElementById('dst-cvs');
const dstCtx = dstCvs.getContext('2d');
const v = document.getElementById('v-temp');

async function snap(mode) {
    const status = document.getElementById('status');
    const widthReq = (mode === 'high') ? 3840 : 1280;
    const heightReq = (mode === 'high') ? 2160 : 720;
    
    status.innerText = `Requesting ${widthReq}p...`;
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { 
                facingMode: "environment", 
                width: { ideal: widthReq }, 
                height: { ideal: heightReq } 
            }
        });
        
        v.srcObject = stream;
        
        // Wait for hardware to spin up
        await new Promise(r => v.onloadedmetadata = r);
        await new Promise(r => setTimeout(r, 800)); // Delay for focus/white balance
        
        masterW = v.videoWidth;
        masterH = v.videoHeight;
        
        const tempCvs = document.createElement('canvas');
        tempCvs.width = masterW;
        tempCvs.height = masterH;
        const tempCtx = tempCvs.getContext('2d');
        tempCtx.drawImage(v, 0, 0);
        
        masterData = tempCtx.getImageData(0, 0, masterW, masterH);
        
        // KILL THE STREAM IMMEDIATELY
        stream.getTracks().forEach(t => t.stop());
        v.srcObject = null;
        
        status.innerText = `Captured: ${masterW}x${masterH}. Memory Locked.`;
        initUI();
    } catch (e) {
        status.innerText = "Error: " + e.message;
        console.error(e);
    }
}

function handleFile(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
            masterW = img.width;
            masterH = img.height;
            const temp = document.createElement('canvas');
            temp.width = masterW; temp.height = masterH;
            const tCtx = temp.getContext('2d');
            tCtx.drawImage(img, 0, 0);
            masterData = tCtx.getImageData(0, 0, masterW, masterH);
            initUI();
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
}

function initUI() {
    srcCvs.width = 800;
    srcCvs.height = 800 * (masterH / masterW);
    
    // Default points to a centered box
    const w = srcCvs.width, h = srcCvs.height;
    points = [
        {x: w*0.2, y: h*0.2}, {x: w*0.8, y: h*0.2},
        {x: w*0.8, y: h*0.8}, {x: w*0.2, y: h*0.8}
    ];
    drawSource();
    renderResult();
}

// Interaction Math
srcCvs.addEventListener('pointerdown', e => {
    const rect = srcCvs.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (srcCvs.width / rect.width);
    const y = (e.clientY - rect.top) * (srcCvs.height / rect.height);
    draggingIdx = points.findIndex(p => Math.hypot(p.x - x, p.y - y) < 40);
    if(draggingIdx !== -1) srcCvs.setPointerCapture(e.pointerId);
});

srcCvs.addEventListener('pointermove', e => {
    if (draggingIdx === -1) return;
    const rect = srcCvs.getBoundingClientRect();
    points[draggingIdx].x = (e.clientX - rect.left) * (srcCvs.width / rect.width);
    points[draggingIdx].y = (e.clientY - rect.top) * (srcCvs.height / rect.height);
    drawSource();
});

srcCvs.addEventListener('pointerup', () => { 
    draggingIdx = -1; 
    renderResult(); 
});

function drawSource() {
    srcCtx.clearRect(0,0,srcCvs.width, srcCvs.height);
    
    // Create preview bitmap for the background
    const temp = document.createElement('canvas');
    temp.width = masterW; temp.height = masterH;
    temp.getContext('2d').putImageData(masterData, 0, 0);
    srcCtx.drawImage(temp, 0, 0, srcCvs.width, srcCvs.height);

    // UI Overlay
    srcCtx.strokeStyle = '#00ff00';
    srcCtx.lineWidth = 2;
    srcCtx.beginPath();
    srcCtx.moveTo(points[0].x, points[0].y);
    points.forEach(p => srcCtx.lineTo(p.x, p.y));
    srcCtx.closePath();
    srcCtx.stroke();
    
    srcCtx.fillStyle = '#ff3300';
    points.forEach(p => {
        srcCtx.beginPath(); srcCtx.arc(p.x, p.y, 10, 0, Math.PI*2); srcCtx.fill();
    });
}

function renderResult() {
    if (!masterData) return;
    const ratio = parseFloat(document.getElementById('aspect-slider').value);
    
    // Preview at 500px width for speed
    const outW = 500;
    const outH = Math.round(outW / ratio);
    dstCvs.width = outW; dstCvs.height = outH;
    
    const dCtx = dstCvs.getContext('2d');
    const dImg = dCtx.createImageData(outW, outH);
    const dPix = dImg.data;

    const scale = masterW / srcCvs.width;
    const p = points.map(pt => ({ x: pt.x * scale, y: pt.y * scale }));

    // Homography solver
    const h = solveHomography(p, outW, outH);

    for (let y = 0; y < outH; y++) {
        for (let x = 0; x < outW; x++) {
            const z = h[6]*x + h[7]*y + 1;
            const sx = Math.floor((h[0]*x + h[1]*y + h[2]) / z);
            const sy = Math.floor((h[3]*x + h[4]*y + h[5]) / z);

            if (sx >= 0 && sx < masterW && sy >= 0 && sy < masterH) {
                const sIdx = (sy * masterW + sx) * 4;
                const dIdx = (y * outW + x) * 4;
                dPix[dIdx] = masterData.data[sIdx];
                dPix[dIdx+1] = masterData.data[sIdx+1];
                dPix[dIdx+2] = masterData.data[sIdx+2];
                dPix[dIdx+3] = 255;
            }
        }
    }
    dCtx.putImageData(dImg, 0, 0);
}

function solveHomography(p, w, h) {
    const x0 = p[0].x, y0 = p[0].y;
    const x1 = p[1].x, y1 = p[1].y;
    const x2 = p[2].x, y2 = p[2].y;
    const x3 = p[3].x, y3 = p[3].y;

    const dx1 = x1 - x2, dy1 = y1 - y2;
    const dx2 = x3 - x2, dy2 = y3 - y2;
    const sx = x0 - x1 + x2 - x3, sy = y0 - y1 + y2 - y3;
    
    const g = ((sx * dy2) - (sy * dx2)) / ((dx1 * dy2) - (dy1 * dx2));
    const h_c = ((dx1 * sy) - (dy1 * sx)) / ((dx1 * dy2) - (dy1 * dx2));
    
    return [
        (x1 - x0 + g * x1) / w, (x3 - x0 + h_c * x3) / h, x0,
        (y1 - y0 + g * y1) / w, (y3 - y0 + h_c * y3) / h, y0,
        g / w, h_c / h
    ];
}

function download() {
    const link = document.createElement('a');
    link.download = 'scan.png';
    link.href = dstCvs.toDataURL();
    link.click();
}
</script>
</body>
</html>
