<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Paper Scanner</title>
    <style>
        body { font-family: sans-serif; margin: 10px; background: #1a1a1a; color: #eee; }
        video, canvas { background: #111; border: 2px solid #555; margin: 8px 0; display: block; max-width: 100%; }
        button { padding: 14px 20px; margin: 6px; font-size: 17px; background: #333; color: #fff; border: 1px solid #666; border-radius: 6px; }
        .note { background: #333; color: #ffdd00; padding: 12px; border-radius: 6px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="note">
    <strong>Note:</strong> Use landscape on mobile.<br>
    Tap "Toggle Camera" twice if the list doesn't populate.
</div>

<div>
    <button onclick="toggleCamera()">📹 Toggle Camera</button>
    <button onclick="takePicture()">📸 Take Picture</button>
    <button onclick="importImage()">📁 Import Image</button>
    <button onclick="renderFull()">🔄 Render Full Output</button>
    <button onclick="resetPoints()">🔄 Reset All</button>
    <button onclick="exportWarped()">💾 Export</button>
</div>

<select id="camera_list_div" onchange="switchCamera(this.value)"></select>
<select id="resolution_select_div" onchange="if(isCameraOn) startStream(currentDeviceId)">
    <option value="640x480">640x480</option>
    <option value="1280x720" selected>1280x720</option>
    <option value="1920x1080">1920x1080</option>
    <option value="3840x2160">3840x2160 (4K)</option>
</select>

<video id="video_takepicture_div" autoplay playsinline></video>

<h3>Source — Drag the 4 red points</h3>
<canvas id="source_canvas" width="800" height="600"></canvas>

<h3>Final Warped Result</h3>
<canvas id="result_canvas"></canvas>

<script>
// Built with help from Grok (xAI)

let currentStream = null;
let isCameraOn = false;
let capturedImage = null;
let currentDeviceId = null;

let sourceCtx, resultCtx;
let points = [];
let draggingIndex = -1;
let pointRotation = 0;
let fineAspectRatio = 1.333;
let outputScale = 1.0;
let brightness = 0;
let contrast = 0;

const myGlobalThis = window;
Array.from(document.querySelectorAll('*')).forEach(el => {
    if (el.id) myGlobalThis[el.id] = el;
});

function initCanvases() {
    sourceCtx = source_canvas.getContext('2d');
    resultCtx = result_canvas.getContext('2d');

    // Dual listeners
    source_canvas.addEventListener('pointerdown', onPointerDown);
    source_canvas.addEventListener('pointermove', onPointerMove);
    source_canvas.addEventListener('pointerup', onPointerUp);
    source_canvas.addEventListener('pointerleave', onPointerUp);

    source_canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    source_canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    source_canvas.addEventListener('touchend', onTouchEnd);

    resetPoints(true);
}

function resetPoints(initial = false) {
    const w = source_canvas.width;
    const h = source_canvas.height;
    points = [
        {x: w*0.15, y: h*0.15},
        {x: w*0.85, y: h*0.15},
        {x: w*0.85, y: h*0.88},
        {x: w*0.15, y: h*0.88}
    ];
    pointRotation = 0;
    fineAspectRatio = 1.333;
    outputScale = 1.0;
    brightness = 0;
    contrast = 0;

    // Safe checks
    const els = ['point_rotate_slider','point_rotate_value','output_scale_slider','output_scale_value',
                 'brightness_slider','bright_value','contrast_slider','contrast_value',
                 'fine_aspect_slider','fine_aspect_input','aspect_select'];
    els.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            if (id.includes('slider') || id.includes('input')) el.value = id.includes('aspect') ? 1.333 : 0;
            if (id.includes('value')) el.textContent = '0°';
        }
    });

    if (!initial && capturedImage) {
        redrawSource();
        renderFull();
    }
}

// Pointer events
function onPointerDown(e) {
    handleStart(e.clientX, e.clientY);
}

function onPointerMove(e) {
    if (draggingIndex === -1) return;
    handleMove(e.clientX, e.clientY);
}

function onPointerUp() {
    if (draggingIndex !== -1) renderFull();
    draggingIndex = -1;
}

// Touch events
function onTouchStart(e) {
    e.preventDefault();
    const touch = e.touches[0];
    handleStart(touch.clientX, touch.clientY);
}

function onTouchMove(e) {
    e.preventDefault();
    if (draggingIndex === -1) return;
    const touch = e.touches[0];
    handleMove(touch.clientX, touch.clientY);
}

function onTouchEnd() {
    if (draggingIndex !== -1) renderFull();
    draggingIndex = -1;
}

function handleStart(clientX, clientY) {
    const rect = source_canvas.getBoundingClientRect();
    const mx = clientX - rect.left;
    const my = clientY - rect.top;

    console.log(`Start at: ${mx.toFixed(0)}, ${my.toFixed(0)}`);

    for (let i = 0; i < 4; i++) {
        const dx = mx - points[i].x;
        const dy = my - points[i].y;
        if (dx*dx + dy*dy < 1400) {   // even larger hit area for fingers
            draggingIndex = i;
            console.log(`Dragging point ${i}`);
            return;
        }
    }
}

function handleMove(clientX, clientY) {
    const rect = source_canvas.getBoundingClientRect();
    points[draggingIndex].x = clientX - rect.left;
    points[draggingIndex].y = clientY - rect.top;

    clampPoints();
    redrawSource();
}

function clampPoints() {
    const w = source_canvas.width, h = source_canvas.height;
    for (let p of points) {
        p.x = Math.max(10, Math.min(w-10, p.x));
        p.y = Math.max(10, Math.min(h-10, p.y));
    }
}

function redrawSource() {
    if (!capturedImage) return;
    sourceCtx.drawImage(capturedImage, 0, 0, source_canvas.width, source_canvas.height);

    sourceCtx.strokeStyle = '#0f0';
    sourceCtx.lineWidth = 4;
    sourceCtx.beginPath();
    sourceCtx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < 4; i++) sourceCtx.lineTo(points[i].x, points[i].y);
    sourceCtx.closePath();
    sourceCtx.stroke();

    sourceCtx.fillStyle = '#f00';
    for (let p of points) {
        sourceCtx.beginPath();
        sourceCtx.arc(p.x, p.y, 16, 0, Math.PI*2);
        sourceCtx.fill();
        sourceCtx.strokeStyle = '#fff';
        sourceCtx.lineWidth = 3;
        sourceCtx.stroke();
    }
}

function renderFull() {
    if (!capturedImage) return;

    let baseW = Math.round(capturedImage.width * outputScale);
    let baseH = Math.round(baseW / fineAspectRatio);

    result_canvas.width = baseW;
    result_canvas.height = baseH;

    resultCtx.clearRect(0, 0, baseW, baseH);

    const srcCanvas = document.createElement('canvas');
    srcCanvas.width = capturedImage.width;
    srcCanvas.height = capturedImage.height;
    srcCanvas.getContext('2d').drawImage(capturedImage, 0, 0);

    const srcData = srcCanvas.getContext('2d').getImageData(0, 0, srcCanvas.width, srcCanvas.height).data;
    const dstImageData = resultCtx.createImageData(baseW, baseH);
    const dstData = dstImageData.data;

    const scaleX = capturedImage.width / source_canvas.width;
    const scaleY = capturedImage.height / source_canvas.height;
    const srcPts = points.map(p => ({ x: p.x * scaleX, y: p.y * scaleY }));

    for (let y = 0; y < baseH; y++) {
        for (let x = 0; x < baseW; x++) {
            const u = x / baseW;
            const v = y / baseH;

            const topX = srcPts[0].x + u * (srcPts[1].x - srcPts[0].x);
            const botX = srcPts[3].x + u * (srcPts[2].x - srcPts[3].x);
            const srcX = topX + v * (botX - topX);

            const topY = srcPts[0].y + u * (srcPts[1].y - srcPts[0].y);
            const botY = srcPts[3].y + u * (srcPts[2].y - srcPts[3].y);
            const srcY = topY + v * (botY - topY);

            const sx = Math.max(0, Math.min(srcCanvas.width-1, Math.round(srcX)));
            const sy = Math.max(0, Math.min(srcCanvas.height-1, Math.round(srcY)));

            const srcIdx = (sy * srcCanvas.width + sx) * 4;
            const dstIdx = (y * baseW + x) * 4;

            let r = srcData[srcIdx];
            let g = srcData[srcIdx+1];
            let b = srcData[srcIdx+2];

            r = Math.min(255, Math.max(0, (r - 128) * (1 + contrast/100) + 128 + brightness));
            g = Math.min(255, Math.max(0, (g - 128) * (1 + contrast/100) + 128 + brightness));
            b = Math.min(255, Math.max(0, (b - 128) * (1 + contrast/100) + 128 + brightness));

            dstData[dstIdx]   = r;
            dstData[dstIdx+1] = g;
            dstData[dstIdx+2] = b;
            dstData[dstIdx+3] = 255;
        }
    }

    resultCtx.putImageData(dstImageData, 0, 0);
}

// Camera
async function toggleCamera() {
    if (isCameraOn) {
        if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        video_takepicture_div.srcObject = null;
        isCameraOn = false;
        return;
    }

    try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === 'videoinput');

        camera_list_div.innerHTML = '';
        videoDevices.forEach((dev, i) => {
            const opt = document.createElement('option');
            opt.value = dev.deviceId;
            opt.textContent = dev.label || `Camera ${i+1}`;
            camera_list_div.appendChild(opt);
        });

        if (videoDevices.length > 0) {
            currentDeviceId = videoDevices[0].deviceId;
            await startStream(currentDeviceId);
            camera_list_div.value = currentDeviceId;
        }
    } catch (err) {
        console.error(err);
        alert("Camera error: " + err.message);
    }
}

async function startStream(deviceId) {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());

    const res = resolution_select_div.value.split('x').map(Number);
    const stream = await navigator.mediaDevices.getUserMedia({
        video: {
            deviceId: deviceId ? { exact: deviceId } : undefined,
            width: { ideal: res[0] },
            height: { ideal: res[1] }
        }
    });

    currentStream = stream;
    video_takepicture_div.srcObject = stream;
    currentDeviceId = deviceId || stream.getVideoTracks()[0].getSettings().deviceId;
    isCameraOn = true;
}

function switchCamera(newDeviceId) {
    if (isCameraOn && newDeviceId) startStream(newDeviceId);
}

// Simple controls
function rotatePoints(degrees) {
    pointRotation = parseFloat(degrees);
    document.getElementById('point_rotate_value').textContent = pointRotation.toFixed(1) + '°';

    if (!capturedImage) return;

    const cx = (points[0].x + points[1].x + points[2].x + points[3].x) / 4;
    const cy = (points[0].y + points[1].y + points[2].y + points[3].y) / 4;
    const rad = pointRotation * Math.PI / 180;

    const original = JSON.parse(JSON.stringify(points));

    for (let i = 0; i < 4; i++) {
        const dx = original[i].x - cx;
        const dy = original[i].y - cy;
        points[i].x = cx + dx * Math.cos(rad) - dy * Math.sin(rad);
        points[i].y = cy + dx * Math.sin(rad) + dy * Math.cos(rad);
    }

    redrawSource();
    renderFull();
}

function updateOutputScale(val) {
    outputScale = parseFloat(val);
    document.getElementById('output_scale_value').textContent = outputScale.toFixed(2);
}

function updateBrightness(val) {
    brightness = parseFloat(val);
    document.getElementById('bright_value').textContent = brightness;
}

function updateContrast(val) {
    contrast = parseFloat(val);
    document.getElementById('contrast_value').textContent = contrast;
}

function updateAspectFromDropdown() {
    const val = parseFloat(aspect_select.value);
    if (val > 0) fineAspectRatio = val;
    renderFull();
}

function updateFineAspect(val) {
    fineAspectRatio = parseFloat(val);
    document.getElementById('fine_aspect_slider').value = fineAspectRatio;
    document.getElementById('fine_aspect_input').value = fineAspectRatio.toFixed(3);
    document.getElementById('aspect_select').value = '0';
    renderFull();
}

function importImage() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            capturedImage = new Image();
            capturedImage.src = ev.target.result;
            capturedImage.onload = () => {
                const aspect = capturedImage.width / capturedImage.height;
                source_canvas.width = 800;
                source_canvas.height = Math.round(800 / aspect);
                result_canvas.width = capturedImage.width;
                result_canvas.height = capturedImage.height;
                redrawSource();
                renderFull();
            };
        };
        reader.readAsDataURL(file);
    };
    input.click();
}

function takePicture() {
    if (!video_takepicture_div.srcObject) return alert("Camera not running");

    const temp = document.createElement('canvas');
    temp.width = video_takepicture_div.videoWidth;
    temp.height = video_takepicture_div.videoHeight;
    temp.getContext('2d').drawImage(video_takepicture_div, 0, 0);

    capturedImage = new Image();
    capturedImage.src = temp.toDataURL('image/png');

    capturedImage.onload = () => {
        const aspect = capturedImage.width / capturedImage.height;
        source_canvas.width = 800;
        source_canvas.height = Math.round(800 / aspect);
        result_canvas.width = capturedImage.width;
        result_canvas.height = capturedImage.height;
        redrawSource();
        renderFull();
    };
}

function exportWarped() {
    const a = document.createElement('a');
    a.download = 'paper_scan.png';
    a.href = result_canvas.toDataURL('image/png');
    a.click();
}

window.onload = initCanvases;
</script>

</body>
</html>
