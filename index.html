<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro: Master Edition</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; margin: 10px; }
        .card { background: #1c1c1e; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #333; }
        canvas { display: block; width: 100%; height: auto; background: #000; touch-action: none; border-radius: 8px; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
        button { padding: 14px; border: none; border-radius: 8px; background: #3a3a3c; color: #fff; font-weight: bold; cursor: pointer; }
        button:active { background: #555; }
        button.primary { background: #0a84ff; }
        button.accent { background: #30d158; }
        button.setup { background: #5856d6; }
        
        .status-box { font-size: 13px; color: #ffd60a; margin-bottom: 10px; padding: 8px; text-align: center; border-radius: 4px; background: rgba(255, 214, 10, 0.1); border: 1px solid rgba(255, 214, 10, 0.3); }
        select, input[type="range"] { width: 100%; background: #2c2c2e; color: #fff; padding: 10px; border: 1px solid #3a3a3c; border-radius: 8px; margin: 8px 0; font-size: 16px; }
        label { font-size: 11px; color: #8e8e93; text-transform: uppercase; }
        
        /* Viewfinder styling */
        #v-temp { width: 100%; border-radius: 8px; margin-bottom: 10px; display: none; background: #000; }
    </style>
</head>
<body>

<div class="card">
    <div id="status" class="status-box">Tap "1. Initialize" to unlock cameras.</div>
    
    <button class="setup" style="width:100%;" onclick="primeCameras()">1. Initialize & List Cameras</button>
    
    <div class="btns" style="margin-top:10px;">
        <div>
            <label>Select Camera</label>
            <select id="cam-select" onchange="toggleViewfinder(true)"></select>
        </div>
        <div>
            <label>Snap Resolution</label>
            <select id="res-target">
                <option value="1280x720">720p</option>
                <option value="1920x1080">1080p</option>
                <option value="3840x2160" selected>4K (Ultra)</option>
            </select>
        </div>
    </div>

    <video id="v-temp" autoplay playsinline></video>

    <div class="btns">
        <button onclick="toggleViewfinder()">📡 Toggle Viewfinder</button>
        <button class="primary" onclick="snap()">📸 SNAP HIGH-RES</button>
    </div>
</div>

<div class="card">
    <label>Alignment Grid</label>
    <canvas id="src-cvs"></canvas>
    <button onclick="document.getElementById('file-in').click()" style="width:100%; margin-top:8px; font-size:12px; background:none; border:1px dashed #444;">📁 Or Import Image</button>
    <input type="file" id="file-in" style="display:none" onchange="handleFile(event)">
</div>

<div class="card">
    <label>Adjust & Export</label>
    <label>Aspect Ratio Presets</label>
<div class="btns" style="grid-template-columns: 1fr 1fr 1fr 1fr;">
    <button onclick="setAspect(1.41)" title="A4 Paper">A4</button>
    <button onclick="setAspect(1.29)" title="US Letter">US</button>
    <button onclick="setAspect(1.66)" title="3x5 Card">3x5</button>
    <button onclick="setAspect(1.50)" title="4x6 Photo">4x6</button>
</div>
<button onclick="flipAspect()" style="width:100%; margin-bottom:10px; font-size:12px; background:#444;">⇄ Flip Portrait/Landscape</button>
    <input type="range" id="aspect-slider" min="0.5" max="2.0" step="0.01" value="0.75" oninput="renderResult()">
    <canvas id="dst-cvs"></canvas>
    <button class="accent" style="width:100%; margin-top:12px;" onclick="download()">💾 SAVE FINAL PNG</button>
</div>

<script>
let masterData = null, masterW = 0, masterH = 0;
let points = [], draggingIdx = -1, rotation = 0;
let vfStream = null;

const srcCvs = document.getElementById('src-cvs'), srcCtx = srcCvs.getContext('2d');
const dstCvs = document.getElementById('dst-cvs'), dstCtx = dstCvs.getContext('2d');
const v = document.getElementById('v-temp');
const status = document.getElementById('status');


    
// 1. PRIME CAMERAS: Request permission then list all devices
async function primeCameras() {
    status.innerText = "Requesting permission...";
    try {
        const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cams = devices.filter(d => d.kind === 'videoinput');
        
        const sel = document.getElementById('cam-select');
        sel.innerHTML = cams.map(c => `<option value="${c.deviceId}">${c.label || 'Camera '+c.deviceId.slice(0,5)}</option>`).join('');
        
        // Stop temp stream
        tempStream.getTracks().forEach(t => t.stop());
        status.innerText = "Cameras unlocked. Choose one and toggle viewfinder.";
    } catch (e) {
        status.innerText = "Error: Permission denied or no camera found.";
    }
}

// 2. TOGGLE VIEWFINDER: Low-res preview to aim
async function toggleViewfinder(forceOn = false) {
    if (vfStream && !forceOn) {
        vfStream.getTracks().forEach(t => t.stop());
        vfStream = null;
        v.style.display = 'none';
        status.innerText = "Viewfinder Off.";
    } else {
        if (vfStream) vfStream.getTracks().forEach(t => t.stop());
        const camId = document.getElementById('cam-select').value;
        try {
            vfStream = await navigator.mediaDevices.getUserMedia({
                video: { deviceId: {exact: camId}, width: 640 }
            });
            v.srcObject = vfStream;
            v.style.display = 'block';
            status.innerText = "Viewfinder On (Low-res).";
        } catch (e) { status.innerText = "Viewfinder failed."; }
    }
}

// 3. THE SNAP: Terminate everything, go 4K, grab, kill.
async function snap() {
    const res = document.getElementById('res-target').value.split('x').map(Number);
    const camId = document.getElementById('cam-select').value;
    
    status.innerText = "CRITICAL CAPTURE STARTING...";
    
    // Kill viewfinder to free RAM
    if (vfStream) { vfStream.getTracks().forEach(t => t.stop()); vfStream = null; }

    try {
        const snapStream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: {exact: camId}, width: {ideal: res[0]}, height: {ideal: res[1]} }
        });
        v.srcObject = snapStream;
        v.style.display = 'block'; // Briefly show the high-res frame

        await new Promise(r => v.onloadedmetadata = r);
        await new Promise(r => setTimeout(r, 1000)); // Focus time
        
        masterW = v.videoWidth; masterH = v.videoHeight;
        const temp = document.createElement('canvas');
        temp.width = masterW; temp.height = masterH;
        temp.getContext('2d').drawImage(v, 0, 0);
        masterData = temp.getContext('2d').getImageData(0, 0, masterW, masterH);
        
        // KILL IMMEDIATELY
        snapStream.getTracks().forEach(t => t.stop());
        v.style.display = 'none';
        
        status.innerText = `SUCCESS: ${masterW}x${masterH} Loaded.`;
        initUI();
    } catch (e) { 
        status.innerText = "High-res Failed. Try a lower resolution."; 
        console.error(e);
    }
}

function handleFile(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const i = new Image();
        i.onload = () => {
            masterW = i.width; masterH = i.height;
            const t = document.createElement('canvas');
            t.width = masterW; t.height = masterH;
            t.getContext('2d').drawImage(i, 0, 0);
            masterData = t.getContext('2d').getImageData(0, 0, masterW, masterH);
            initUI();
        };
        i.src = ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
}

function initUI() {
    srcCvs.width = 800; srcCvs.height = 800 * (masterH / masterW);
    points = [{x:100,y:100}, {x:700,y:100}, {x:700,y:srcCvs.height-100}, {x:100,y:srcCvs.height-100}];
    drawSource();
    renderResult();
}

function setAspect(val) { document.getElementById('aspect-slider').value = val; renderResult(); }
function rotate(deg) { rotation = (rotation + deg) % 360; renderResult(); }

function flipAspect() {
    const slider = document.getElementById('aspect-slider');
    // Calculate inverse: 1 / current_ratio
    const newRatio = 1 / parseFloat(slider.value);
    
    // Ensure we don't exceed the slider's min/max limits
    if (newRatio < 0.5) slider.min = newRatio;
    if (newRatio > 2.5) slider.max = newRatio;
    
    slider.value = newRatio.toFixed(2);
    renderResult();
}
    
// Interaction Logic
srcCvs.addEventListener('pointerdown', e => {
    const r = srcCvs.getBoundingClientRect();
    const x = (e.clientX - r.left) * (srcCvs.width / r.width);
    const y = (e.clientY - r.top) * (srcCvs.height / r.height);
    draggingIdx = points.findIndex(p => Math.hypot(p.x - x, p.y - y) < 40);
    if(draggingIdx !== -1) srcCvs.setPointerCapture(e.pointerId);
});
srcCvs.addEventListener('pointermove', e => {
    if (draggingIdx === -1) return;
    const r = srcCvs.getBoundingClientRect();
    points[draggingIdx].x = (e.clientX - r.left) * (srcCvs.width / r.width);
    points[draggingIdx].y = (e.clientY - r.top) * (srcCvs.height / r.height);
    drawSource();
});
srcCvs.addEventListener('pointerup', () => { draggingIdx = -1; renderResult(); });

function drawSource() {
    srcCtx.clearRect(0,0,srcCvs.width, srcCvs.height);
    const t = document.createElement('canvas');
    t.width = masterW; t.height = masterH;
    t.getContext('2d').putImageData(masterData, 0, 0);
    srcCtx.drawImage(t, 0, 0, srcCvs.width, srcCvs.height);
    srcCtx.strokeStyle = '#0a84ff'; srcCtx.lineWidth = 3;
    srcCtx.beginPath(); srcCtx.moveTo(points[0].x, points[0].y);
    points.forEach(p => srcCtx.lineTo(p.x, p.y));
    srcCtx.closePath(); srcCtx.stroke();
    srcCtx.fillStyle = '#ff3b30';
    points.forEach(p => { srcCtx.beginPath(); srcCtx.arc(p.x, p.y, 12, 0, Math.PI*2); srcCtx.fill(); });
}

function renderResult() {
    if (!masterData) return;
    const ratio = parseFloat(document.getElementById('aspect-slider').value);
    const outW = 600; const outH = Math.round(outW / ratio);
    const tCvs = document.createElement('canvas'); tCvs.width = outW; tCvs.height = outH;
    const tCtx = tCvs.getContext('2d'); const tImg = tCtx.createImageData(outW, outH);
    const dPix = tImg.data;
    const scale = masterW / srcCvs.width;
    const p = points.map(pt => ({ x: pt.x * scale, y: pt.y * scale }));
    const h = solveHomography(p, outW, outH);

    for (let y = 0; y < outH; y++) {
        for (let x = 0; x < outW; x++) {
            const z = h[6]*x + h[7]*y + 1;
            const sx = Math.floor((h[0]*x + h[1]*y + h[2]) / z);
            const sy = Math.floor((h[3]*x + h[4]*y + h[5]) / z);
            if (sx >= 0 && sx < masterW && sy >= 0 && sy < masterH) {
                const sIdx = (sy * masterW + sx) * 4;
                const dIdx = (y * outW + x) * 4;
                dPix[dIdx] = masterData.data[sIdx]; dPix[dIdx+1] = masterData.data[sIdx+1];
                dPix[dIdx+2] = masterData.data[sIdx+2]; dPix[dIdx+3] = 255;
            }
        }
    }
    tCtx.putImageData(tImg, 0, 0);
    if (rotation % 180 === 0) { dstCvs.width = outW; dstCvs.height = outH; }
    else { dstCvs.width = outH; dstCvs.height = outW; }
    dstCtx.save();
    dstCtx.translate(dstCvs.width/2, dstCvs.height/2);
    dstCtx.rotate(rotation * Math.PI / 180);
    dstCtx.drawImage(tCvs, -outW/2, -outH/2);
    dstCtx.restore();
}

function solveHomography(p, w, h) {
    const x0 = p[0].x, y0 = p[0].y, x1 = p[1].x, y1 = p[1].y, x2 = p[2].x, y2 = p[2].y, x3 = p[3].x, y3 = p[3].y;
    const dx1 = x1 - x2, dy1 = y1 - y2, dx2 = x3 - x2, dy2 = y3 - y2;
    const sx = x0 - x1 + x2 - x3, sy = y0 - y1 + y2 - y3;
    const g = ((sx * dy2) - (sy * dx2)) / ((dx1 * dy2) - (dy1 * dx2));
    const h_c = ((dx1 * sy) - (dy1 * sx)) / ((dx1 * dy2) - (dy1 * dx2));
    return [(x1-x0+g*x1)/w, (x3-x0+h_c*x3)/h, x0, (y1-y0+g*y1)/w, (y3-y0+h_c*y3)/h, y0, g/w, h_c/h];
}

function download() {
    const link = document.createElement('a');
    link.download = `scan_${Date.now()}.png`;
    link.href = dstCvs.toDataURL('image/png', 1.0);
    link.click();
}
</script>
</body>
</html>
